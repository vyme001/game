<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <h1>RPS</h1>
    <section>
        <button type="button" value="rock">rock</button>
        <button type="button" value="paper">paper</button>
        <button type="button" value="scissors">scissors</button>
    </section>  
    <div id="container">
        <div id="container-2">
            <section id="scores">
                <div class="scoreCon">
                    <p>USER:</p>
                    <p id="user_scoreCard" class="scoreCard"></p>
                </div>
                <div class="scoreCon">
                    <p>PC:</p>
                    <p id="pc_scoreCard" class="scoreCard"></p>
                </div>
                
            </section>
        </div>
        <span id="new-message"></span>
    </div>    
</body>
</html>
